kind = "web"
previewPath = "/"
title = "RN Codegen Studio"
version = "1.0.0"
id = "artifacts/codegen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21670
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/codegen run dev"

[services.env]
PORT = "21670"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/codegen", "run", "build"]
publicDir = "artifacts/codegen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
