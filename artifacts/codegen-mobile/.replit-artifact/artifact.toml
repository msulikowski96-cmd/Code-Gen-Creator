kind = "mobile"
previewPath = "/mobile/"
title = "RN Codegen Mobile"
version = "1.0.0"
id = "artifacts/codegen-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21327
name = "expo"
paths = ["/mobile/"]

[services.development]
run = "pnpm --filter @workspace/codegen-mobile run dev"

[services.env]
PORT = "21327"
BASE_PATH = "/mobile/"

[services.production]
build = ["pnpm", "--filter", "@workspace/codegen-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/codegen-mobile", "run", "serve"]
